<!DOCTYPE html>
<html>
<head>
  <title>Admin Dashboard | ThinkIQ</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="dashboard">
  <div class="sidebar">
    <h2>Admin Panel</h2>
    <button onclick="showCreateQuiz()">Create Quiz</button>
    <button onclick="showAllQuizzes()">Delete Quiz</button>
    <button onclick="showResults()">View Results</button>
    <button onclick="logout()">Logout</button>
  </div>

  <div class="content" id="content">
    <h2>Welcome Admin</h2>
    <p>Use the sidebar to manage quizzes and view results.</p>
  </div>
</div>

<script>
  // Auth guard
  (async function() {
    const res = await fetch('api/auth/me');
    if (!res.ok) { window.location.href = 'login.html'; return; }
    const data = await res.json();
    if (data.user.role !== 'admin') window.location.href = 'userdashboard.html';
  })();

  async function logout() {
    await fetch('api/auth/logout', { method: 'POST' });
    window.location.href = 'login.html';
  }

  function showCreateQuiz() {
    document.getElementById('content').innerHTML = `
      <h2>Create Quiz</h2>
      <input id="quizTitle" placeholder="Quiz Title" style="width:100%;padding:10px;margin-bottom:15px;border:2px solid #e0e0e0;border-radius:8px;font-size:1rem;"><br>
      <div id="questionsContainer"></div>
      <button onclick="addQuestion()" style="width:auto;padding:10px 20px;margin-right:10px;">+ Add Question</button>
      <button onclick="createQuiz()" style="width:auto;padding:10px 20px;">Create Quiz</button>
    `;
    addQuestion();
  }

  function addQuestion() {
    const container = document.getElementById('questionsContainer');
    const index = container.children.length;
    const div = document.createElement('div');
    div.className = 'quiz-card';
    div.innerHTML = `
      <h4>Question ${index + 1}</h4>
      <input class="q-text" placeholder="Enter Question" style="width:100%;padding:8px;margin-bottom:8px;border:1px solid #ccc;border-radius:6px;"><br>
      <input class="opt" placeholder="Option 1" style="width:100%;padding:8px;margin-bottom:5px;border:1px solid #ccc;border-radius:6px;"><br>
      <input class="opt" placeholder="Option 2" style="width:100%;padding:8px;margin-bottom:5px;border:1px solid #ccc;border-radius:6px;"><br>
      <input class="opt" placeholder="Option 3" style="width:100%;padding:8px;margin-bottom:5px;border:1px solid #ccc;border-radius:6px;"><br>
      <input class="opt" placeholder="Option 4" style="width:100%;padding:8px;margin-bottom:8px;border:1px solid #ccc;border-radius:6px;"><br>
      <input class="ans" placeholder="Correct Answer (write exact option text)" style="width:100%;padding:8px;border:2px solid #667eea;border-radius:6px;">
    `;
    container.appendChild(div);
  }

  async function createQuiz() {
    const title = document.getElementById('quizTitle').value.trim();
    if (!title) return alert('Enter Quiz Title');

    const blocks = document.querySelectorAll('#questionsContainer .quiz-card');
    const questions = [];

    blocks.forEach(block => {
      const question_text = block.querySelector('.q-text').value.trim();
      const opts = block.querySelectorAll('.opt');
      const correct_answer = block.querySelector('.ans').value.trim();
      if (!question_text || !correct_answer) return;
      questions.push({
        question_text,
        option1: opts[0].value,
        option2: opts[1].value,
        option3: opts[2].value,
        option4: opts[3].value,
        correct_answer
      });
    });

    if (questions.length === 0) return alert('Add at least one question');

    const res = await fetch('/api/quizzes', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ title, questions })
    });

    const data = await res.json();
    if (!res.ok) return alert(data.message || 'Error creating quiz');

    alert('Quiz Created Successfully!');
    showAllQuizzes();
  }

  async function showAllQuizzes() {
    const res = await fetch('/api/quizzes');
    const quizzes = await res.json();

    let html = '<h2>All Quizzes</h2>';
    if (quizzes.length === 0) {
      html += '<p>No quizzes created yet.</p>';
    } else {
      quizzes.forEach(quiz => {
        html += `
          <div class="quiz-card">
            <b>${quiz.title}</b><br>
            <small>Questions: ${quiz.question_count} | Created by: ${quiz.created_by || 'N/A'}</small>
            <br><br>
            <button onclick="deleteQuiz(${quiz.id})" style="width:auto;padding:8px 16px;background:linear-gradient(135deg,#e53e3e,#c53030);">Delete</button>
          </div>
        `;
      });
    }
    document.getElementById('content').innerHTML = html;
  }

  async function deleteQuiz(id) {
    if (!confirm('Are you sure you want to delete this quiz?')) return;
    const res = await fetch(`/api/quizzes/${id}`, { method: 'DELETE' });
    const data = await res.json();
    if (!res.ok) return alert(data.message || 'Error');
    alert('Quiz Deleted');
    showAllQuizzes();
  }

  async function showResults() {
    const res = await fetch('/api/results');
    const results = await res.json();

    let html = '<h2>User Results</h2>';
    if (results.length === 0) {
      html += '<p>No results yet.</p>';
    } else {
      results.forEach(r => {
        const pct = Math.round((r.score / r.total) * 100);
        html += `
          <div class="quiz-card">
            <b>User:</b> ${r.user}<br>
            <b>Quiz:</b> ${r.quiz}<br>
            <b>Score:</b> ${r.score} / ${r.total} (${pct}%)<br>
            <small>${new Date(r.submitted_at).toLocaleString()}</small>
          </div>
        `;
      });
    }
    document.getElementById('content').innerHTML = html;
  }
</script>

</body>
</html>
